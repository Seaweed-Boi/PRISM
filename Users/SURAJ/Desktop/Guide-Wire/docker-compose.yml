version: "3.9"
services:
  redis:
    image: redis:7-alpine
    container_name: prism-redis
    ports:
      - "6379:6379"
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    ports:
      - "5432:5432"
    volumes:
      - prism_pgdata:/var/lib/postgresql/data

volumes:
  prism_pgdata:
